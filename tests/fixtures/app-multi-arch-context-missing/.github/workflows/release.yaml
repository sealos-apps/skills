name: release
on:
  push:
    tags:
      - "v*"
jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Build runtime image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/${{ github.repository }}:${{ matrix.arch }} .
      - name: Cache images
        working-directory: deploy
        run: |
          sealos registry save --registry-dir=registry --arch ${{ matrix.arch }} .
      - name: Build cluster image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/${{ github.repository }}-cluster:${{ matrix.arch }} deploy
          docker images
      - name: Publish manifests
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository }}/${{ github.repository }}-cluster:latest ghcr.io/${{ github.repository }}/${{ github.repository }}-cluster:amd64 ghcr.io/${{ github.repository }}/${{ github.repository }}-cluster:arm64
      - name: Export and sync OSS
        run: |
          mkdir -p release-assets
          touch release-assets/example-app-cluster.tar.gz
          md5sum release-assets/example-app-cluster.tar.gz > release-assets/example-app-cluster.tar.gz.md5
          du -h release-assets/example-app-cluster.tar.gz
          ossutil cp release-assets/example-app-cluster.tar.gz oss://sealos-apps/example-app/
          ossutil cp release-assets/example-app-cluster.tar.gz.md5 oss://sealos-apps/example-app/
