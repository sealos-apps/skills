apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: example-app
spec:
  {{- if ne (toString .Values.disableHttps) "true" }}
  tls:
    - hosts:
        - "{{ .Values.cloudDomain }}"
      secretName: "{{ .Values.certSecretName }}"
  {{- end }}
  rules:
    - host: "{{ .Values.cloudDomain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: example-app
                port:
                  number: 80
