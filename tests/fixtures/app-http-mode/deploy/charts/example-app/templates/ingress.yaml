apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: example-app
spec:
  rules:
    - host: "{{ .Values.cloudDomain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: example-app
                port:
                  number: 443
  tls:
    - hosts:
        - "{{ .Values.cloudDomain }}"
      secretName: example-cert
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: example-app-config
data:
  publicURL: "https://{{ .Values.cloudDomain }}:443"

