name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile scripts
        run: python3 -m py_compile skills/sealos-apps-audit/scripts/audit_sealos_apps.py
      - name: Run tests
        run: python3 -m unittest discover -s tests
      - name: Validate skill metadata
        run: python3 scripts/quick_validate.py skills/sealos-apps-audit
      - name: Public boundary scan
        run: |
          grep -v '^[[:space:]]*$' tests/public-boundary-denylist.txt > /tmp/public-boundary-denylist.txt
          if grep -R -n -f /tmp/public-boundary-denylist.txt --exclude=public-boundary-denylist.txt --exclude-dir=.git .; then
            exit 1
          fi
